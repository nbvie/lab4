<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Slideshow</title>

    <style>
      body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .slider {
        position: relative;
        width: 800px;
        height: 500px;
        overflow: hidden;
        border-radius: 20px;
      }

      .slide {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;

        opacity: 0;

        transition: opacity 1.5s ease-in-out;
      }

      .active {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="slider">
      <img class="slide active" src="https://picsum.photos/id/1015/800/500" />

      <img class="slide" src="https://picsum.photos/id/1016/800/500" />

      <img class="slide" src="https://picsum.photos/id/1025/800/500" />
    </div>

    <script>
      const slides = document.querySelectorAll(".slide");

      let index = 0;

      setInterval(() => {
        slides[index].classList.remove("active");

        index++;

        if (index >= slides.length) {
          index = 0;
        }

        slides[index].classList.add("active");
      }, 3000);
    </script>
  </body>
</html>
